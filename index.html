<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OPIC IM3 Mobile Practice</title>
  <style>
    :root {
      --bg: #eef2f6;
      --paper: #ffffff;
      --ink: #1f2933;
      --muted: #5b6673;
      --line: #d7dde5;
      --soft: #f6f8fb;
      --accent: #0f766e;
      --accent-dark: #0b5d56;
      --warn: #9a3412;
    }

    body.dark {
      --bg: #111827;
      --paper: #1f2937;
      --ink: #f3f4f6;
      --muted: #b7c0cc;
      --line: #374151;
      --soft: #172033;
      --accent: #14b8a6;
      --accent-dark: #0f9488;
      --warn: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Malgun Gothic", sans-serif;
      line-height: 1.45;
      color-scheme: light;
    }

    body.dark {
      color-scheme: dark;
    }

    .app {
      max-width: 820px;
      margin: 0 auto;
      padding: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      background: var(--paper);
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }

    .mode-button {
      align-self: end;
      min-width: 76px;
      min-height: 40px;
      padding: 8px 10px;
      background: var(--ink);
      color: var(--paper);
    }

    body.dark .mode-button {
      background: #f3f4f6;
      color: #111827;
    }

    label {
      display: block;
      margin-bottom: 3px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      -webkit-text-fill-color: var(--ink);
      min-height: 40px;
      padding: 8px 10px;
      font-size: 15px;
      border-radius: 6px;
    }

    body.dark select {
      background: #111827;
      color: var(--ink);
      -webkit-text-fill-color: var(--ink);
    }

    .card {
      background: var(--paper);
      color: var(--ink);
      -webkit-text-fill-color: var(--ink);
      border: 1px solid var(--line);
      margin-bottom: 12px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .topic-line {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
    }

    .badge {
      white-space: nowrap;
      border: 1px solid var(--accent);
      color: var(--accent-dark);
      padding: 6px 9px;
      font-size: 13px;
      font-weight: 700;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .question {
      background: var(--soft);
      color: var(--ink);
      -webkit-text-fill-color: var(--ink);
      border: 1px solid var(--line);
      padding: 13px;
      border-radius: 8px;
    }

    .question p {
      margin: 12px 0 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.55;
    }

    button {
      min-width: 150px;
      min-height: 48px;
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      border-radius: 6px;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.is-playing {
      background: var(--warn);
      cursor: progress;
    }

    button.is-playing:hover {
      background: var(--warn);
    }

    .story,
    .script {
      padding: 14px;
    }

    .story {
      background: #fbfcfd;
      color: var(--ink);
      -webkit-text-fill-color: var(--ink);
      border-left: 4px solid var(--accent);
      border-radius: 0 8px 8px 0;
    }

    body.dark .story {
      background: #111827;
      color: var(--ink);
    }

    body.dark .question,
    body.dark .step {
      background: #111827;
    }

    .script {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      -webkit-text-fill-color: var(--ink);
    }

    .script-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .question-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .story p,
    .script p {
      margin: 0 0 10px;
      font-size: 17px;
      line-height: 1.56;
    }

    .story p:last-child,
    .script p:last-child {
      margin-bottom: 0;
    }

    .structure {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .step {
      background: var(--soft);
      color: var(--ink);
      -webkit-text-fill-color: var(--ink);
      border: 1px solid var(--line);
      padding: 10px;
      min-height: 82px;
      border-radius: 8px;
    }

    .step strong {
      display: block;
      color: var(--accent-dark);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .step span {
      display: block;
      font-size: 13px;
      color: var(--ink);
    }

    .memory {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 14px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 14px;
    }

    .memory li {
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      margin: 9px 0 0;
      line-height: 1.5;
    }

    .warn {
      color: var(--warn);
    }

    .hidden {
      display: none;
    }

    .survey-list {
      margin: 0;
      padding-left: 22px;
      font-size: 17px;
    }

    .survey-list li {
      padding: 7px 0;
      border-bottom: 1px solid var(--line);
    }

    @media (max-width: 760px) {
      body {
        background: var(--bg);
        color: var(--ink);
      }

      .app {
        padding: 10px;
      }

      .card {
        box-shadow: none;
      }

      h2 {
        font-size: 21px;
      }

      h3 {
        font-size: 18px;
      }

      .toolbar {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 54px;
        gap: 6px;
        padding: 6px 8px;
        margin-left: -10px;
        margin-right: -10px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }

      .mode-button {
        width: 100%;
        min-width: 0;
        min-height: 38px;
        padding: 6px 4px;
        font-size: 0;
      }

      .mode-button::after {
        content: "Mode";
        font-size: 12px;
      }

      label {
        font-size: 10.5px;
        margin-bottom: 2px;
      }

      select {
        min-height: 38px;
        padding: 7px 7px;
        font-size: 13.5px;
      }

      .topic-line {
        display: block;
      }

      .badge {
        display: inline-block;
        margin-top: 10px;
      }

      .structure {
        grid-template-columns: 1fr;
      }

      .memory {
        grid-template-columns: 1fr;
      }

      .question-tools,
      .script-tools {
        display: grid;
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
        min-width: 0;
      }

      .card {
        padding: 14px;
        margin-bottom: 10px;
      }

      .story,
      .script {
        padding: 12px;
      }

      .story p,
      .script p,
      .question p,
      .survey-list {
        font-size: 16.5px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="toolbar">
      <div>
        <label for="categorySelect">Part</label>
        <select id="categorySelect"></select>
      </div>
      <div>
        <label for="topicSelect">Topic</label>
        <select id="topicSelect"></select>
      </div>
      <button class="mode-button" id="modeButton" type="button" onclick="toggleDarkMode()">Dark</button>
    </section>

    <section class="card">
      <div class="topic-line">
        <div>
          <h2 id="topicTitle"></h2>
          <p class="note" id="topicNote"></p>
        </div>
        <div class="badge" id="topicBadge"></div>
      </div>

      <div id="questionArea">
        <h3>Question</h3>
        <div class="question">
          <div class="question-tools">
            <button id="questionPlayButton" type="button" onclick="toggleQuestion()">Play Question</button>
          </div>
          <p id="questionText"></p>
        </div>
        <p class="note warn">Eva와 똑같은 목소리는 아니고, 브라우저의 영어 음성으로 시험 느낌만 연습합니다.</p>
      </div>
    </section>

    <section class="card hidden" id="surveyCard">
      <h3>선택할 서베이 항목</h3>
      <ol class="survey-list" id="surveyList"></ol>
    </section>

    <section class="card" id="storyCard">
      <h3>스토리 암기용</h3>
      <div class="story" id="storyBox"></div>
      <p class="note">이 부분을 먼저 한국어로 자연스럽게 말할 수 있으면, 영어도 훨씬 덜 막힙니다.</p>
    </section>

    <section class="card" id="structureCard">
      <h3>답변 구조</h3>
      <div class="structure" id="structureBox"></div>
    </section>

    <section class="card" id="scriptCard">
      <h3>영어 연습용</h3>
      <div class="script-tools">
        <button id="answerPlayButton" type="button" onclick="toggleAnswer()">Play Answer</button>
      </div>
      <div class="script" id="scriptBox"></div>
      <p class="note">한 문장씩 끊어서 읽고, 마지막에는 화면을 덜 보면서 45~60초로 말해보세요.</p>
    </section>

    <section class="card" id="memoryCard">
      <h3>핵심 문장</h3>
      <ul class="memory" id="memoryBox"></ul>
    </section>
  </main>

  <script>
    const lessons = [
      {

        question: "Before the test starts, you choose survey items. Choose topics that are easy for you to talk about.",
        story: ["서베이는 내가 받을 문제 범위를 일부 고르는 단계다.", "내가 고른 항목에서 문제가 나올 수 있다.", "그래서 아무거나 고르면 안 된다.", "내가 말하기 쉬운 주제를 골라야 한다.", "하나의 스토리로 여러 주제를 커버할 수 있으면 좋다.", "어려운 배경지식이 필요한 주제는 피하는 것이 좋다.", "IM3 목표라면 쉬운 경험과 감정을 말할 수 있는 주제가 좋다.", "음악, 영화, 카페, 쇼핑, 여행, 집 휴가는 말하기 쉽다.", "운동처럼 말할 내용이 부족한 주제는 피하는 편이 좋다.", "서베이는 시험 전략의 시작이다."],

        memory: ["Choose easy topics.", "Do not choose randomly.", "One story can cover many topics.", "Survey is the first strategy step."]
      },
      {
        category: "Survey Guide",
        topic: "Recommended Choices",
        badge: "추천 선택",
        question: "These are recommended survey choices for an IM3 study plan.",
        story: ["첫째, 일 경험 없음으로 선택한다.", "둘째, 학생이 아니라는 방향으로 선택한다.", "셋째, 수강 후 5년 이상 지남으로 선택한다.", "넷째, 개인 주택이나 아파트에 홀로 거주로 선택한다.", "다섯째, 영화 감상을 선택한다.", "여섯째, 공연 관람을 선택한다.", "일곱째, 쇼핑하기를 선택한다.", "여덟째, TV 시청하기를 선택한다.", "아홉째, 콘서트 관람하기를 선택한다.", "열째, 술집이나 바에 가기를 선택한다.", "열한째, 카페나 커피 전문점 가기를 선택한다.", "열두째, 음악 감상을 선택한다.", "열셋째, 운동을 전혀 하지 않음을 선택한다.", "열넷째, 국내 여행을 선택한다.", "열다섯째, 해외 여행을 선택한다.", "마지막으로 집에서 보내는 휴가를 선택한다."],

      {

      {

      {

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("dark", isDark);
      modeButton.textContent = isDark ? "Light" : "Dark";
      localStorage.setItem("opicTheme", theme);
    }

    function toggleDarkMode() {
      applyTheme(document.body.classList.contains("dark") ? "light" : "dark");
    }

    function uniqueCategories() {
      const categories = [...new Set(lessons.map((lesson) => lesson.category))];
      return categories.filter((category) => category !== "Survey Guide").concat("Survey Guide");
    }

    function fillCategories() {
      categorySelect.innerHTML = "";
      uniqueCategories().forEach((category) => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      });
    }

    function fillTopics() {
      const category = categorySelect.value;
      topicSelect.innerHTML = "";
      if (category === "Survey Guide") {
        const option = document.createElement("option");
        option.value = "survey";
        option.textContent = "Recommended Survey Choices";
        topicSelect.appendChild(option);
        renderLesson();
        return;
      }
      lessons
        .filter((lesson) => lesson.category === category)
        .forEach((lesson, index) => {
          const option = document.createElement("option");
          option.value = String(index);
          option.textContent = lesson.topic;
          topicSelect.appendChild(option);
        });
      renderLesson();
    }

    function currentLesson() {
      const category = categorySelect.value;
      if (category === "Survey Guide") return null;
      const index = Number(topicSelect.value || 0);
      return lessons.filter((lesson) => lesson.category === category)[index];
    }

    function paragraphList(target, items) {
      target.innerHTML = "";
      items.forEach((item) => {
        const p = document.createElement("p");
        p.textContent = item;
        target.appendChild(p);
      });
    }

    function renderStructure(lesson) {
      const labels = [
        ["Main Point", lesson.script[0]],
        ["Reason", lesson.script[1] || ""],
        ["Example", lesson.script[3] || lesson.script[4] || ""],
        ["Feeling", lesson.script[7] || lesson.script[8] || ""],
        ["Closing", lesson.script[lesson.script.length - 1]]
      ];
      structureBox.innerHTML = "";
      labels.forEach(([title, text]) => {
        const div = document.createElement("div");
        div.className = "step";
        div.innerHTML = `<strong>${title}</strong><span>${text}</span>`;
        structureBox.appendChild(div);
      });
    }

    function renderLesson() {
      stopSpeech();
      if (categorySelect.value === "Survey Guide") {
        topicTitle.textContent = "Recommended Survey Choices";
        topicNote.textContent = "필요할 때만 확인하는 서베이 선택 목록";
        topicBadge.textContent = "서베이";
        questionArea.classList.add("hidden");
        surveyCard.classList.remove("hidden");
        storyCard.classList.add("hidden");
        structureCard.classList.add("hidden");
        scriptCard.classList.add("hidden");
        memoryCard.classList.add("hidden");
        surveyList.innerHTML = "";
        surveyChoices.forEach((choice) => {
          const li = document.createElement("li");
          li.textContent = choice;
          surveyList.appendChild(li);
        });
        return;
      }
      const lesson = currentLesson();
      questionArea.classList.remove("hidden");
      surveyCard.classList.add("hidden");
      storyCard.classList.remove("hidden");
      structureCard.classList.remove("hidden");
      scriptCard.classList.remove("hidden");
      memoryCard.classList.remove("hidden");
      topicTitle.textContent = lesson.topic;
      topicNote.textContent = "IM3 목표: 짧은 문장으로 45~60초 말하기";
      topicBadge.textContent = lesson.badge;
      questionText.textContent = lesson.question;
      paragraphList(storyBox, lesson.story);
      paragraphList(scriptBox, lesson.script);
      renderStructure(lesson);
      memoryBox.innerHTML = "";
      lesson.memory.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        memoryBox.appendChild(li);
      });
    }

    function pickVoice(kind) {
      const voices = window.speechSynthesis.getVoices();
      if (kind === "male") {
        return voices.find((voice) =>
          /male|man|guy|david|mark|guy|brian|james|daniel|alex|fred|tom|george/i.test(voice.name)
        ) || voices.find((voice) => voice.lang && voice.lang.startsWith("en")) || voices[0];
      }
      return voices.find((voice) =>
        /female|woman|zira|jenny|aria|samantha|natural/i.test(voice.name)
      ) || voices.find((voice) => voice.lang && voice.lang.startsWith("en")) || voices[0];
    }

    function speak(text, options = {}) {
      const utterance = new SpeechSynthesisUtterance(text);
      const preferredVoice = pickVoice(options.voice || "female");

      if (preferredVoice) utterance.voice = preferredVoice;
      utterance.lang = "en-US";
      utterance.rate = options.rate || 0.88;
      utterance.pitch = 1;
      if (typeof options.onend === "function") {
        utterance.onend = options.onend;
      }
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function setPlaybackMode(mode) {
      questionPlayButton.classList.toggle("is-playing", mode === "question");
      answerPlayButton.classList.toggle("is-playing", mode === "answer");
      questionPlayButton.textContent = mode === "question" ? "Stop Question" : "Play Question";
      answerPlayButton.textContent = mode === "answer" ? "Stop Answer" : "Play Answer";
    }

    function toggleQuestion() {
      if (questionLoop) {
        stopSpeech();
        return;
      }
      playQuestion();
    }

    function toggleAnswer() {
      if (answerLoop) {
        stopSpeech();
        return;
      }
      playAnswer();
    }

    function playQuestion() {
      questionLoop = true;
      answerLoop = false;
      clearTimeout(answerLoopTimer);
      setPlaybackMode("question");
      speak(questionText.textContent.trim(), {
        voice: "female",
        rate: 0.88,
        onend: function () {
          if (!questionLoop) return;
          clearTimeout(questionLoopTimer);
          questionLoopTimer = setTimeout(playQuestion, 3000);
        }
      });
    }

    function playAnswer() {
      questionLoop = false;
      clearTimeout(questionLoopTimer);
      answerLoop = true;
      setPlaybackMode("answer");
      const lesson = currentLesson();
      speak(lesson.script.join(" "), {
        voice: "male",
        rate: 0.82,
        onend: function () {
          if (!answerLoop) return;
          clearTimeout(answerLoopTimer);
          answerLoopTimer = setTimeout(playAnswer, 3000);
        }
      });
    }

    function stopSpeech() {
      questionLoop = false;
      answerLoop = false;
      clearTimeout(questionLoopTimer);
      clearTimeout(answerLoopTimer);
      window.speechSynthesis.cancel();
      setPlaybackMode(null);
    }

    categorySelect.addEventListener("change", fillTopics);
    topicSelect.addEventListener("change", renderLesson);
    window.speechSynthesis.onvoiceschanged = function () {
      window.speechSynthesis.getVoices();
    };

    fillCategories();
    fillTopics();
    applyTheme(localStorage.getItem("opicTheme") || "light");
  </script>
</body>
</html>
